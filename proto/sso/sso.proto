syntax = "proto3";

package auth;

option go_package = "iProtas.sso.v1;ssov1";

// Auth is service for managing permissions and roles.
service Auth {
  // Register registers a new user.
  rpc Register (RegisterRequest) returns (RegisterResponse);
  // Login logs in a user and returns an auth token.
  rpc Login (LoginRequest) returns (LoginResponse);
}


message RegisterRequest {
  string username = 1; // Login of the user to register.
  string email = 2; // Email of the user to register.
  string password = 3; // Password of the user to register.
}

message RegisterResponse {
  int64 user_id = 1; // User ID of the registered user.
}

message LoginRequest {
  string username = 1; // Login of the user to login.
  string email = 2; // Email of the user to alternative login.
  string password = 3; // Password of the user to login.
  int32 app_id = 4; // ID of the app to login to.
}

message LoginResponse {
  string token = 1; // Auth token of the logged in user.
}
